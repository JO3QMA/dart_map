name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: |
          if npm run lint -- --help > /dev/null 2>&1; then
            npm run lint
          else
            echo "lint script is not defined; skipping lint step."
          fi

      - name: Test
        run: |
          if npm test -- --help > /dev/null 2>&1; then
            npm test
          else
            echo "test script is not defined; skipping test step."
          fi
