name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  # PR 時にフォーマットを自動修正してプッシュ
  format-fix:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier (fix)
        run: npm run format

      - name: Commit and push if formatted
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No format changes."
          else
            git commit -m "style: apply Prettier"
            git push
          fi

  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (TypeScript / ESLint)
        run: npm run lint

      - name: Format (Prettier)
        run: npm run format:check

      - name: Test (Vitest)
        run: npm run test:run
